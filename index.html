<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 26 — Your Local Kickoff Times</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg: #070b14;
    --bg-glow: radial-gradient(ellipse 800px 400px at 50% -10%, rgba(54,211,153,0.18), transparent 60%);
    --surface: #121a2c;
    --surface-alt: #1b2540;
    --border: #28324d;
    --text: #eef1f7;
    --text-muted: #8a96b3;
    --gold: #f4c95d;
    --green: #36d399;
    --live: #ff5d5d;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    background-color: var(--bg);
    background-image: var(--bg-glow);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
    -webkit-font-smoothing: antialiased;
  }

  .wrap{ max-width: 520px; margin: 0 auto; }

  /* HEADER */
  header{ text-align:center; margin-bottom: 28px; }
  .eyebrow{
    font-family:'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  h1{
    font-family:'Anton', sans-serif;
    font-size: 42px;
    letter-spacing: 0.04em;
    line-height: 1;
    background: linear-gradient(180deg, #fff 0%, var(--gold) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .tz-note{
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .tz-note span{ color: var(--text); font-weight: 600; }

  /* NEXT MATCH HERO */
  .hero{
    background: linear-gradient(160deg, var(--surface-alt) 0%, var(--surface) 100%);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .hero::before{
    content:'';
    position:absolute; inset:-50% -10% auto -10%;
    height: 140px;
    background: radial-gradient(ellipse at center, rgba(244,201,93,0.15), transparent 70%);
    pointer-events:none;
  }
  .hero-label{
    font-family:'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--green);
    display:flex; align-items:center; gap:8px;
    margin-bottom: 14px;
  }
  .live-dot{
    width:7px; height:7px; border-radius:50%;
    background: var(--green);
    box-shadow: 0 0 0 0 var(--green);
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(54,211,153,0.6); }
    70%{ box-shadow:0 0 0 8px rgba(54,211,153,0); }
    100%{ box-shadow:0 0 0 0 rgba(54,211,153,0); }
  }
  .hero-teams{
    font-family:'Anton', sans-serif;
    font-size: 26px;
    letter-spacing: 0.02em;
    margin-bottom: 4px;
    text-align:center;
  }
  .hero-group{
    text-align:center;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 18px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .countdown{
    display:flex; justify-content:center; gap: 14px; margin-bottom: 14px;
  }
  .count-block{ text-align:center; }
  .count-num{
    font-family:'Space Mono', monospace;
    font-weight:700;
    font-size: 32px;
    color: var(--gold);
    background: rgba(244,201,93,0.08);
    border: 1px solid rgba(244,201,93,0.25);
    border-radius: 10px;
    padding: 6px 4px;
    min-width: 56px;
    display:block;
  }
  .count-unit{
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 6px;
    display:block;
  }
  .hero-meta{
    text-align:center;
    font-size: 13px;
    color: var(--text-muted);
  }
  .hero-meta b{ color: var(--text); }

  /* TABS */
  .tabs{
    display:flex; gap:8px; margin-bottom: 16px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding: 10px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 600;
    cursor:pointer;
    font-family:'Inter', sans-serif;
    transition: all .15s ease;
  }
  .tab.active{
    background: var(--green);
    color: #07120c;
    border-color: var(--green);
  }
  .tab .tab-date{
    display:block;
    font-family:'Space Mono', monospace;
    font-size: 11px;
    margin-top:2px;
    opacity:.8;
  }

  /* MATCH CARDS */
  .day-panel{ display:none; }
  .day-panel.active{ display:block; }

  .card{
    display:flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow:hidden;
    position: relative;
  }
  .card-main{
    flex:1;
    padding: 14px 16px;
    display:flex; align-items:center; gap:12px;
  }
  .group-badge{
    flex-shrink:0;
    width: 34px; height:34px;
    border-radius:50%;
    border: 1.5px solid var(--gold);
    color: var(--gold);
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Mono', monospace;
    font-weight:700;
    font-size: 13px;
  }
  .match-info{ flex:1; min-width:0; }
  .teams{
    font-size: 15px;
    font-weight: 600;
    display:flex; align-items:center; gap:6px; flex-wrap:wrap;
    margin-bottom: 4px;
  }
  .vs{
    font-size: 11px;
    color: var(--text-muted);
    font-family:'Space Mono', monospace;
  }
  .venue{
    font-size: 12px;
    color: var(--text-muted);
  }
  .kickoff{
    text-align:right;
    flex-shrink:0;
    padding-left: 8px;
  }
  .kickoff-time{
    font-family:'Space Mono', monospace;
    font-weight:700;
    font-size: 16px;
    color: var(--green);
    white-space:nowrap;
  }
  .kickoff-date{
    font-size: 11px;
    color: var(--text-muted);
    margin-top:2px;
  }

  .card-share{
    width: 56px;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background: var(--surface-alt);
    border-left: 2px dashed var(--border);
    cursor:pointer;
    text-decoration:none;
    color: var(--text);
    transition: background .15s ease;
  }
  .card-share:hover{ background: rgba(54,211,153,0.15); }
  .card-share svg{ width:22px; height:22px; fill: var(--green); }

  .card::before, .card::after{
    content:'';
    position:absolute;
    width:16px; height:16px;
    background: var(--bg);
    border-radius:50%;
    right: 48px;
    z-index:1;
  }
  .card::before{ top:-8px; }
  .card::after{ bottom:-8px; }

  /* SHARE ALL */
  .share-all{
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%;
    margin-top: 8px;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--green), #21b07b);
    color: #07120c;
    font-family:'Inter', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor:pointer;
    text-decoration:none;
  }
  .share-all svg{ width:18px; height:18px; fill:#07120c; }

  footer{
    text-align:center;
    margin-top: 28px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Canada · Mexico · USA</div>
    <h1>WORLD CUP 26</h1>
    <div class="tz-note">Showing kickoff times in <span id="tzName">your timezone</span></div>
  </header>

  <div class="hero" id="hero">
    <div class="hero-label"><span class="live-dot"></span> Next kickoff</div>
    <div class="hero-teams" id="heroTeams">Loading…</div>
    <div class="hero-group" id="heroGroup"></div>
    <div class="countdown" id="countdown">
      <div class="count-block"><span class="count-num" id="cdDays">--</span><span class="count-unit">days</span></div>
      <div class="count-block"><span class="count-num" id="cdHours">--</span><span class="count-unit">hrs</span></div>
      <div class="count-block"><span class="count-num" id="cdMins">--</span><span class="count-unit">min</span></div>
      <div class="count-block"><span class="count-num" id="cdSecs">--</span><span class="count-unit">sec</span></div>
    </div>
    <div class="hero-meta" id="heroMeta"></div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>

  <a href="#" class="share-all" id="shareAll">
    <svg viewBox="0 0 24 24"><path d="M17.6 6.32A8.86 8.86 0 0 0 12.05 4a8.94 8.94 0 0 0-7.74 13.4L3 21l3.7-1.28a8.9 8.9 0 0 0 4.95 1.45h.01c4.92 0 8.95-4 8.95-8.97a8.93 8.93 0 0 0-2.6-6.3zM12.06 19.7h-.01a7.4 7.4 0 0 1-3.78-1.04l-.27-.16-2.8.97.94-2.73-.18-.28a7.4 7.4 0 0 1-1.14-3.96 7.43 7.43 0 0 1 12.65-5.27 7.36 7.36 0 0 1 2.18 5.27 7.43 7.43 0 0 1-7.59 7.2zm4.07-5.56c-.22-.11-1.31-.65-1.51-.72-.2-.07-.35-.11-.5.11-.15.22-.57.72-.7.87-.13.15-.26.16-.48.05-.22-.11-.93-.34-1.77-1.09-.65-.58-1.09-1.3-1.22-1.52-.13-.22-.01-.34.1-.45.11-.11.26-.28.39-.42.13-.14.17-.24.26-.4.09-.16.04-.3-.02-.42-.07-.11-.6-1.44-.82-1.97-.22-.52-.44-.45-.6-.46-.16-.01-.34-.01-.52-.01-.18 0-.47.07-.72.34-.25.27-.96.94-.96 2.29 0 1.35.98 2.65 1.12 2.84.14.18 1.9 2.9 4.6 3.95 2.7 1.05 2.7.7 3.18.65.48-.04 1.55-.63 1.77-1.25.22-.62.22-1.15.15-1.26-.07-.11-.25-.18-.47-.3z"/></svg>
    Share this list on WhatsApp
  </a>

  <footer>Tap any match's WhatsApp icon to share it directly · Times update automatically to your device's timezone<br>Made by jophyunni@gmail.com</footer>

</div>

<script>
  // ---- DATA ----
  // All times in UTC. Source: official 2026 World Cup group-stage schedule.
  const matches = [
    { day:1, dayLabel:'Sun, Jun 14', group:'E', utc:'2026-06-14T17:00:00Z', home:'Germany', homeFlag:'🇩🇪', away:'Curaçao', awayFlag:'🇨🇼', venue:'NRG Stadium, Houston' },
    { day:1, dayLabel:'Sun, Jun 14', group:'F', utc:'2026-06-14T20:00:00Z', home:'Netherlands', homeFlag:'🇳🇱', away:'Japan', awayFlag:'🇯🇵', venue:'AT&T Stadium, Dallas' },
    { day:1, dayLabel:'Sun, Jun 14', group:'E', utc:'2026-06-14T23:00:00Z', home:'Ivory Coast', homeFlag:'🇨🇮', away:'Ecuador', awayFlag:'🇪🇨', venue:'Lincoln Financial Field, Philadelphia' },
    { day:1, dayLabel:'Sun, Jun 14', group:'F', utc:'2026-06-15T02:00:00Z', home:'Sweden', homeFlag:'🇸🇪', away:'Tunisia', awayFlag:'🇹🇳', venue:'Estadio BBVA, Monterrey' },

    { day:2, dayLabel:'Mon, Jun 15', group:'H', utc:'2026-06-15T17:00:00Z', home:'Spain', homeFlag:'🇪🇸', away:'Cape Verde', awayFlag:'🇨🇻', venue:'Mercedes-Benz Stadium, Atlanta' },
    { day:2, dayLabel:'Mon, Jun 15', group:'G', utc:'2026-06-15T22:00:00Z', home:'Belgium', homeFlag:'🇧🇪', away:'Egypt', awayFlag:'🇪🇬', venue:'Lumen Field, Seattle' },
    { day:2, dayLabel:'Mon, Jun 15', group:'H', utc:'2026-06-15T22:00:00Z', home:'Saudi Arabia', homeFlag:'🇸🇦', away:'Uruguay', awayFlag:'🇺🇾', venue:'Hard Rock Stadium, Miami' },
    { day:2, dayLabel:'Mon, Jun 15', group:'G', utc:'2026-06-16T04:00:00Z', home:'Iran', homeFlag:'🇮🇷', away:'New Zealand', awayFlag:'🇳🇿', venue:'SoFi Stadium, Inglewood' },
  ];

  const whatsappIcon = `<svg viewBox="0 0 24 24"><path d="M17.6 6.32A8.86 8.86 0 0 0 12.05 4a8.94 8.94 0 0 0-7.74 13.4L3 21l3.7-1.28a8.9 8.9 0 0 0 4.95 1.45h.01c4.92 0 8.95-4 8.95-8.97a8.93 8.93 0 0 0-2.6-6.3zM12.06 19.7h-.01a7.4 7.4 0 0 1-3.78-1.04l-.27-.16-2.8.97.94-2.73-.18-.28a7.4 7.4 0 0 1-1.14-3.96 7.43 7.43 0 0 1 12.65-5.27 7.36 7.36 0 0 1 2.18 5.27 7.43 7.43 0 0 1-7.59 7.2zm4.07-5.56c-.22-.11-1.31-.65-1.51-.72-.2-.07-.35-.11-.5.11-.15.22-.57.72-.7.87-.13.15-.26.16-.48.05-.22-.11-.93-.34-1.77-1.09-.65-.58-1.09-1.3-1.22-1.52-.13-.22-.01-.34.1-.45.11-.11.26-.28.39-.42.13-.14.17-.24.26-.4.09-.16.04-.3-.02-.42-.07-.11-.6-1.44-.82-1.97-.22-.52-.44-.45-.6-.46-.16-.01-.34-.01-.52-.01-.18 0-.47.07-.72.34-.25.27-.96.94-.96 2.29 0 1.35.98 2.65 1.12 2.84.14.18 1.9 2.9 4.6 3.95 2.7 1.05 2.7.7 3.18.65.48-.04 1.55-.63 1.77-1.25.22-.62.22-1.15.15-1.26-.07-.11-.25-.18-.47-.3z"/></svg>`;

  // ---- TIMEZONE ----
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  document.getElementById('tzName').textContent = tz;

  function localParts(utcStr){
    const d = new Date(utcStr);
    const date = d.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
    const time = d.toLocaleTimeString(undefined, { hour:'numeric', minute:'2-digit' });
    return { date, time, dateObj: d };
  }

  // ---- BUILD TABS + PANELS ----
  const days = [...new Set(matches.map(m => m.day))];
  const tabsEl = document.getElementById('tabs');
  const panelsEl = document.getElementById('panels');

  days.forEach((day, idx) => {
    const dayMatches = matches.filter(m => m.day === day);
    const sample = localParts(dayMatches[0].utc);

    // Tab
    const tab = document.createElement('div');
    tab.className = 'tab' + (idx === 0 ? ' active' : '');
    tab.innerHTML = `Matchday ${day}<span class="tab-date">${dayMatches[0].dayLabel} (host time)</span>`;
    tab.dataset.day = day;
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + day).classList.add('active');
      currentDay = day;
    });
    tabsEl.appendChild(tab);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'day-panel' + (idx === 0 ? ' active' : '');
    panel.id = 'panel-' + day;

    dayMatches.forEach(m => {
      const lp = localParts(m.utc);
      const card = document.createElement('div');
      card.className = 'card';
      const shareText = `⚽ ${m.home} vs ${m.away} (Group ${m.group})\n🕐 ${lp.date}, ${lp.time} — your local time\n📍 ${m.venue}\n\n#WorldCup26`;
      card.innerHTML = `
        <div class="card-main">
          <div class="group-badge">${m.group}</div>
          <div class="match-info">
            <div class="teams">${m.homeFlag} ${m.home} <span class="vs">vs</span> ${m.awayFlag} ${m.away}</div>
            <div class="venue">${m.venue}</div>
          </div>
          <div class="kickoff">
            <div class="kickoff-time">${lp.time}</div>
            <div class="kickoff-date">${lp.date}</div>
          </div>
        </div>
        <a class="card-share" href="https://wa.me/?text=${encodeURIComponent(shareText)}" target="_blank" rel="noopener" aria-label="Share match on WhatsApp">${whatsappIcon}</a>
      `;
      panel.appendChild(card);
    });

    panelsEl.appendChild(panel);
  });

  let currentDay = days[0];

  // ---- SHARE ALL (current day) ----
  document.getElementById('shareAll').addEventListener('click', (e) => {
    e.preventDefault();
    const dayMatches = matches.filter(m => m.day === currentDay);
    let text = `⚽ World Cup 26 — ${dayMatches[0].dayLabel} matches (your local time)\n\n`;
    dayMatches.forEach(m => {
      const lp = localParts(m.utc);
      text += `${m.homeFlag} ${m.home} vs ${m.away} ${m.awayFlag} — ${lp.time}\n📍 ${m.venue}\n\n`;
    });
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
  });

  // ---- NEXT MATCH COUNTDOWN ----
  function updateHero(){
    const now = new Date();
    const upcoming = matches
      .map(m => ({ ...m, time: new Date(m.utc) }))
      .filter(m => m.time > now)
      .sort((a,b) => a.time - b.time)[0];

    if (!upcoming){
      document.getElementById('heroTeams').textContent = 'All listed matches have kicked off';
      document.getElementById('heroGroup').textContent = '';
      document.getElementById('heroMeta').textContent = '';
      document.querySelector('.countdown').style.display = 'none';
      return;
    }

    const lp = localParts(upcoming.utc);
    document.getElementById('heroTeams').textContent = `${upcoming.homeFlag} ${upcoming.home} vs ${upcoming.away} ${upcoming.awayFlag}`;
    document.getElementById('heroGroup').textContent = `Group ${upcoming.group} · ${upcoming.venue}`;
    document.getElementById('heroMeta').innerHTML = `Kicks off <b>${lp.date} at ${lp.time}</b> your time`;

    const diff = upcoming.time - now;
    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff / (1000*60*60)) % 24);
    const mins = Math.floor((diff / (1000*60)) % 60);
    const secs = Math.floor((diff / 1000) % 60);

    document.getElementById('cdDays').textContent = String(days).padStart(2,'0');
    document.getElementById('cdHours').textContent = String(hours).padStart(2,'0');
    document.getElementById('cdMins').textContent = String(mins).padStart(2,'0');
    document.getElementById('cdSecs').textContent = String(secs).padStart(2,'0');
  }

  updateHero();
  setInterval(updateHero, 1000);
</script>
</body>
</html>
